<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logistic Regression Explainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f4;
    --color-background-info: #e6f1fb;
    --color-background-success: #eaf3de;
    --color-background-warning: #faeeda;
    --color-background-danger: #fcebeb;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-info: #185fa5;
    --color-text-success: #3b6d11;
    --color-text-warning: #854f0b;
    --color-text-danger: #a32d2d;
    --color-border-primary: rgba(0,0,0,0.4);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-border-info: #b5d4f4;
    --color-border-success: #c0dd97;
    --color-border-warning: #fac775;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: system-ui, -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #2c2c2a;
      --color-background-info: #042c53;
      --color-background-success: #173404;
      --color-background-warning: #412402;
      --color-background-danger: #501313;
      --color-text-primary: #e8e6df;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-text-success: #97c459;
      --color-text-warning: #ef9f27;
      --color-text-danger: #f09595;
      --color-border-primary: rgba(255,255,255,0.4);
      --color-border-secondary: rgba(255,255,255,0.3);
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-border-info: #0c447c;
      --color-border-success: #27500a;
      --color-border-warning: #633806;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 28px 32px;
  }

  h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 24px; }

  .cv-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .cv-tab {
    padding: 7px 16px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary); cursor: pointer;
    font-size: 13px; color: var(--color-text-secondary);
    font-family: var(--font-sans); transition: all .15s;
  }
  .cv-tab.active {
    background: var(--color-background-primary); color: var(--color-text-primary);
    border-color: var(--color-border-primary); font-weight: 500;
  }
  .cv-panel { display: none; }
  .cv-panel.active { display: block; }

  .cv-insight {
    margin-top: 16px; padding: 12px 14px;
    border-left: 2px solid var(--color-border-info);
    background: var(--color-background-info);
    border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
    font-size: 13px; color: var(--color-text-secondary); line-height: 1.6;
  }

  .cv-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .cv-stat {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md); padding: 10px 14px;
  }
  .cv-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .cv-stat-val { font-size: 22px; font-weight: 500; }
  .cv-stat-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }

  .mode-btns { display: flex; gap: 6px; margin-bottom: 14px; }
  .mode-btn {
    padding: 6px 14px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary); cursor: pointer;
    font-size: 12px; color: var(--color-text-secondary);
    font-family: var(--font-sans); transition: all .15s;
  }
  .mode-btn.active {
    background: var(--color-background-primary); color: var(--color-text-primary);
    border-color: var(--color-border-primary); font-weight: 500;
  }

  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .slider-row label { font-size: 13px; color: var(--color-text-secondary); width: 90px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--color-text-info); }
  .slider-row span { font-size: 13px; font-weight: 500; min-width: 48px; text-align: right; }

  .chart-wrap { position: relative; width: 100%; height: 300px; margin: 12px 0; }

  .back-link { display: inline-block; margin-bottom: 16px; font-size: 13px; color: var(--color-text-info); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">&larr; All tools</a>
  <h1>Logistic Regression — Interactive Explainer</h1>
  <p class="subtitle">MGMT E-104 · Review Section 8 · Logistic Regression</p>

  <div class="cv-tabs">
    <button class="cv-tab active" onclick="showTab('compare')">Linear vs. Logistic</button>
    <button class="cv-tab" onclick="showTab('converter')">Log-odds ↔ Probability</button>
  </div>

  <!-- TAB 1: LINEAR VS LOGISTIC -->
  <div class="cv-panel active" id="panel-compare">
    <div class="mode-btns">
      <button class="mode-btn active" id="btn-linear" onclick="setMode('linear')">Linear regression</button>
      <button class="mode-btn" id="btn-logistic" onclick="setMode('logistic')">Logistic regression</button>
      <button class="mode-btn" id="btn-both" onclick="setMode('both')">Both</button>
    </div>
    <div class="chart-wrap"><canvas id="chartCompare"></canvas></div>
    <div class="cv-insight" id="compare-insight"></div>
  </div>

  <!-- TAB 2: LOG-ODDS CONVERTER -->
  <div class="cv-panel" id="panel-converter">
    <div class="slider-row">
      <label>Log-odds</label>
      <input type="range" min="-6" max="6" value="0" step="0.1" id="logit-slider" oninput="updateConverter()">
      <span id="logit-val">0.0</span>
    </div>

    <div class="cv-stats">
      <div class="cv-stat">
        <div class="cv-label">Log-odds (logit)</div>
        <div class="cv-stat-val" id="stat-logit">0.00</div>
        <div class="cv-stat-sub">ln(p / (1−p))</div>
      </div>
      <div class="cv-stat">
        <div class="cv-label">Odds</div>
        <div class="cv-stat-val" id="stat-odds">1.00</div>
        <div class="cv-stat-sub">e^logit = p / (1−p)</div>
      </div>
      <div class="cv-stat">
        <div class="cv-label">Probability</div>
        <div class="cv-stat-val" id="stat-prob">0.500</div>
        <div class="cv-stat-sub">odds / (1 + odds)</div>
      </div>
    </div>

    <div class="chart-wrap"><canvas id="chartSigmoid"></canvas></div>
    <div class="cv-insight" id="converter-insight"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
const txtCol = isDark ? '#b4b2a9' : '#5f5e5a';
const gridCol = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const blueCol = isDark ? '#85B7EB' : '#378ADD';
const redCol = '#E24B4A';
const greenCol = isDark ? '#5DCAA5' : '#1D9E75';

function showTab(id) {
  document.querySelectorAll('.cv-tab').forEach((t, i) => t.classList.toggle('active', ['compare','converter'][i] === id));
  document.querySelectorAll('.cv-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
}

// --- TAB 1: LINEAR VS LOGISTIC ---
const dataPoints = [
  {x:1,y:0},{x:2,y:0},{x:2.5,y:0},{x:3,y:0},{x:3.5,y:0},{x:4,y:0},{x:4.5,y:0},
  {x:5,y:0},{x:5.5,y:0},{x:5.5,y:1},{x:6,y:0},{x:6,y:1},{x:6.5,y:1},{x:7,y:0},
  {x:7,y:1},{x:7.5,y:1},{x:8,y:1},{x:8.5,y:1},{x:9,y:1},{x:9.5,y:1},{x:10,y:1},
  {x:10.5,y:1},{x:11,y:1},{x:12,y:1}
];
const linPts = []; for(let x=-0.5;x<=13;x+=0.25) linPts.push({x, y: -0.192+0.0893*x});
const logPts = []; for(let x=-0.5;x<=13;x+=0.15) logPts.push({x, y: 1/(1+Math.exp(-(-5.5+0.9*x)))});

const chartCompare = new Chart(document.getElementById('chartCompare'), {
  type: 'scatter',
  data: {
    datasets: [
      { label:'Observations', data:dataPoints, backgroundColor:blueCol, pointRadius:6, pointHoverRadius:8, order:1 },
      { label:'Linear fit', data:linPts, type:'line', borderColor:redCol, borderWidth:2.5, pointRadius:0, borderDash:[6,4], tension:0, order:2 },
      { label:'Logistic fit', data:logPts, type:'line', borderColor:greenCol, borderWidth:2.5, pointRadius:0, tension:0.4, order:3, hidden:true }
    ]
  },
  options: {
    responsive:true, maintainAspectRatio:false, animation:{duration:600},
    plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ctx.dataset.label==='Observations' ? 'X='+ctx.parsed.x+', Y='+ctx.parsed.y : null } } },
    scales: {
      x: { title:{display:true, text:'X (predictor)', color:txtCol, font:{size:13}}, min:-1, max:13.5, grid:{color:gridCol}, ticks:{color:txtCol} },
      y: { title:{display:true, text:'P(Y = 1)', color:txtCol, font:{size:13}}, min:-0.3, max:1.3, grid:{color:gridCol}, ticks:{color:txtCol, callback: v => v===0||v===0.5||v===1 ? v : ''} }
    }
  }
});

const compareInsights = {
  linear: "Linear regression predicts values outside [0, 1] — the dashed red line goes below 0 on the left and above 1 on the right. Those predictions don't make sense as probabilities.",
  logistic: "The logistic (sigmoid) curve is naturally bounded between 0 and 1. As X increases, the predicted probability smoothly transitions — it can never escape the [0, 1] range.",
  both: "Side by side, the problem is clear: the linear fit (dashed red) violates the probability boundary, while the logistic curve (green) stays bounded. This is why we need logistic regression for binary outcomes."
};

function setMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+mode));
  chartCompare.data.datasets[1].hidden = mode === 'logistic';
  chartCompare.data.datasets[2].hidden = mode === 'linear';
  chartCompare.update();
  document.getElementById('compare-insight').textContent = compareInsights[mode];
}
setMode('linear');

// --- TAB 2: LOG-ODDS CONVERTER ---
const sigmoidData = []; for(let x=-6;x<=6;x+=0.15) sigmoidData.push({x, y: 1/(1+Math.exp(-x))});

const chartSigmoid = new Chart(document.getElementById('chartSigmoid'), {
  type: 'scatter',
  data: {
    datasets: [
      { label:'Sigmoid', data:sigmoidData, type:'line', borderColor:greenCol, borderWidth:2.5, pointRadius:0, tension:0.4, order:2 },
      { label:'Current', data:[{x:0,y:0.5}], backgroundColor:redCol, borderColor:redCol, pointRadius:8, pointHoverRadius:10, order:1 }
    ]
  },
  options: {
    responsive:true, maintainAspectRatio:false, animation:{duration:200},
    plugins: { legend:{display:false} },
    scales: {
      x: { title:{display:true, text:'Log-odds (logit)', color:txtCol, font:{size:13}}, min:-6.5, max:6.5, grid:{color:gridCol}, ticks:{color:txtCol, stepSize:2} },
      y: { title:{display:true, text:'Probability', color:txtCol, font:{size:13}}, min:-0.05, max:1.05, grid:{color:gridCol}, ticks:{color:txtCol, callback: v => [0,0.25,0.5,0.75,1].includes(v)?v:''} }
    }
  }
});

function updateConverter() {
  const logit = parseFloat(document.getElementById('logit-slider').value);
  const odds = Math.exp(logit);
  const prob = odds / (1 + odds);

  document.getElementById('logit-val').textContent = logit.toFixed(1);
  document.getElementById('stat-logit').textContent = logit.toFixed(2);
  document.getElementById('stat-odds').textContent = odds >= 100 ? Math.round(odds).toLocaleString() : odds.toFixed(2);
  document.getElementById('stat-prob').textContent = prob.toFixed(3);

  chartSigmoid.data.datasets[1].data = [{x:logit, y:prob}];
  chartSigmoid.update();

  let msg;
  if (prob < 0.1) msg = 'With log-odds of '+logit.toFixed(1)+', the event is very unlikely ('+((prob*100).toFixed(1))+'%). The odds are '+odds.toFixed(2)+' to 1 against.';
  else if (prob < 0.4) msg = 'Log-odds of '+logit.toFixed(1)+' puts us in the lower part of the curve — probability is '+((prob*100).toFixed(1))+'%. Notice how the curve is steeper here than at the extremes.';
  else if (prob <= 0.6) msg = 'Near log-odds = 0, the curve is steepest and probability is around 50%. This is where small changes in X have the biggest effect on probability. At exactly 0, odds = 1:1.';
  else if (prob < 0.9) msg = 'Log-odds of '+logit.toFixed(1)+' gives probability '+((prob*100).toFixed(1))+'%. We are on the upper portion of the S-curve — the event is more likely than not.';
  else msg = 'With log-odds of '+logit.toFixed(1)+', the event is very likely ('+((prob*100).toFixed(1))+'%). Notice how even large increases in log-odds barely change probability up here — the curve flattens.';
  document.getElementById('converter-insight').textContent = msg;
}
updateConverter();
</script>
</body>
</html>
